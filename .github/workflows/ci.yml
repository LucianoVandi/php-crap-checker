name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ "8.3", "8.4" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: simplexml, pcov
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit

      - name: PHPStan
        run: vendor/bin/phpstan analyse src tests

      - name: PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPMD
        run: vendor/bin/phpmd src/ text .phpmd.xml

      - name: Rector (dry-run)
        run: vendor/bin/rector process --dry-run

      - name: Infection
        run: vendor/bin/infection --configuration=infection.json.dist

      - name: CRAP check — fixture should pass (threshold=999)
        run: php bin/crap-check check tests/Fixtures/crap4j-with-violations.xml --threshold=999

      - name: CRAP check — fixture should fail (threshold=30)
        run: |
          if php bin/crap-check check tests/Fixtures/crap4j-with-violations.xml --threshold=30; then
            echo "Expected crap-check to exit with non-zero, but it exited 0"
            exit 1
          fi
