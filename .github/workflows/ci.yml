name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ci:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [ "8.3", "8.4" ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: ${{ matrix.php }}
          extensions: simplexml, pcov
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Composer audit
        run: composer audit

      - name: Composer unused
        run: vendor/bin/composer-unused

      - name: Composer normalize (dry-run)
        run: composer normalize --dry-run --diff

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-clover build/coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: build/coverage.xml
          fail_ci_if_error: false
          use_oidc: true

      - name: PHPStan
        run: vendor/bin/phpstan analyse src tests --memory-limit=256M

      - name: PHP CS Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPMD
        run: vendor/bin/phpmd src/ text .phpmd.xml

      - name: Rector (dry-run)
        run: vendor/bin/rector process --dry-run

      - name: Infection
        run: vendor/bin/infection --configuration=infection.json.dist

      - name: CRAP check — fixture should pass (threshold=999)
        run: php bin/crap-check check tests/Fixtures/crap4j-with-violations.xml --threshold=999

      - name: CRAP check — fixture should fail (threshold=30)
        run: |
          if php bin/crap-check check tests/Fixtures/crap4j-with-violations.xml --threshold=30; then
            echo "Expected crap-check to exit with non-zero, but it exited 0"
            exit 1
          fi
